<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="筋肉カード">
<meta name="theme-color" content="#1a1a18">

<title>肩・上腕 筋肉カード</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#eceae3;
  --t1:#18181a;--t2:#6b6a63;--t3:#aaa99f;
  --border:rgba(0,0,0,0.09);
  --green:#1D9E75;--green-bg:#e1f5ee;
  --red:#D85A30;--red-bg:#faece7;
  --r:18px;--rsm:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#18181a;--surface:#232321;--surface2:#2c2c29;--t1:#f0efe8;--t2:#a8a79e;--t3:#6b6a63;--border:rgba(255,255,255,0.09);--green-bg:#04342c;--red-bg:#4a1b0c;}
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;padding-top:var(--safe-top);}
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;background:var(--surface);border-bottom:0.5px solid var(--border);}
.hdr-title{font-size:17px;font-weight:700;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.menu-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px;display:flex;flex-direction:column;gap:22px;}
.sec-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:8px 16px;border-radius:99px;border:0.5px solid var(--border);background:var(--surface);color:var(--t2);font-size:14px;cursor:pointer;transition:background .12s,color .12s;}
.chip.on{background:var(--t1);color:var(--bg);border-color:transparent;}
.menu-footer{flex-shrink:0;padding:14px 16px calc(14px + var(--safe-bot));background:var(--surface);border-top:0.5px solid var(--border);}
.start-btn{width:100%;padding:17px;background:var(--t1);color:var(--bg);border:none;border-radius:var(--r);font-size:17px;font-weight:700;cursor:pointer;}
.start-btn:active{opacity:.75;}
.stat-row{display:flex;gap:10px;}
.stat-card{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rsm);padding:12px;text-align:center;}
.stat-card .num{font-size:22px;font-weight:700;}
.stat-card .lbl{font-size:11px;color:var(--t2);margin-top:2px;}
.quiz-hdr{flex-shrink:0;padding:10px 16px;display:flex;align-items:center;gap:12px;background:var(--surface);border-bottom:0.5px solid var(--border);}
.q-cnt{font-size:13px;color:var(--t2);white-space:nowrap;}
.prog-wrap{flex:1;height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .3s;}
.quiz-body{flex:1;display:flex;flex-direction:column;padding:12px 14px;gap:10px;min-height:0;}
.card-wrap{flex:1;perspective:1200px;cursor:pointer;min-height:0;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 18px;text-align:center;gap:10px;overflow:hidden;}
.card-back-face{transform:rotateY(180deg);justify-content:flex-start;align-items:stretch;padding:0;gap:0;overflow:hidden;}
.c-tag{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;}
.c-name{font-size:clamp(18px,5.5vw,26px);font-weight:700;line-height:1.3;}
.c-grp{font-size:12px;padding:4px 13px;border-radius:99px;background:var(--surface2);color:var(--t2);}
.c-hint{font-size:12px;color:var(--t3);}
.b-svg-wrap{flex:0 0 48%;min-height:0;overflow:hidden;background:var(--surface2);border-radius:var(--r) var(--r) 0 0;display:flex;align-items:center;justify-content:center;}
.b-svg-wrap svg{width:100%;height:100%;display:block;}
.b-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:100%;height:100%;}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.b-loading-text{font-size:12px;color:var(--t3);}
.b-err{font-size:11px;color:var(--red);text-align:center;padding:16px;line-height:1.6;}
.b-data{flex:1;min-height:0;padding:10px 12px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.b-item{background:var(--surface2);border-radius:var(--rsm);padding:9px 12px;}
.b-item.hl{background:var(--green-bg);border:1.5px solid var(--green);}
.b-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.b-val{font-size:13px;line-height:1.55;color:var(--t1);}
.b-item.hl .b-val{color:var(--green);font-weight:600;}
.ans-row{flex-shrink:0;display:flex;gap:10px;}
.ans-btn{flex:1;padding:15px 8px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;border:1.5px solid;transition:transform .1s,opacity .1s;}
.ans-btn:active{transform:scale(.96);opacity:.82;}
.btn-ng{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.btn-ok{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.ans-row.hidden{visibility:hidden;}
.quiz-footer{flex-shrink:0;padding:0 14px calc(10px + var(--safe-bot));}
.back-btn{width:100%;padding:11px;background:none;border:0.5px solid var(--border);border-radius:var(--rsm);font-size:13px;color:var(--t2);cursor:pointer;}
.back-btn:active{opacity:.6;}
.result-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:20px;text-align:center;}
.ring-wrap{position:relative;width:140px;height:140px;}
.ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:32px;font-weight:700;}
.ring-sub{font-size:12px;color:var(--t2);}
.result-msg{font-size:15px;color:var(--t2);line-height:1.7;max-width:260px;}
.result-footer{flex-shrink:0;padding:14px 16px calc(14px + var(--safe-bot));display:flex;flex-direction:column;gap:10px;}
.res-btn{width:100%;padding:16px;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--t1);}
.res-btn:active{opacity:.7;}
.res-btn.primary{background:var(--t1);color:var(--bg);border-color:transparent;}
</style>

  {n:"僧帽筋（上行部）",g:"僧帽",起始:"T5–T12の棘突起",停止:"肩峰",神経:"副神経CN XI・頸神経叢 C3・C4",作用:"肩甲骨を上内側に引く"},
  {n:"肩甲挙筋",g:"僧帽",起始:"C1–C4の横突起",停止:"肩甲棘",神経:"肩甲背神経と頸神経 C3・C4",作用:"肩甲骨を内側に引く"},
  {n:"小菱形筋",g:"僧帽",起始:"C6・C7の棘突起",停止:"肩甲骨内側縁（肩甲棘より上）",神経:"肩甲背神経と頸神経 C3・C4",作用:"肩甲骨を上内側に引く・下角を内側に動かす"},
  {n:"大菱形筋",g:"僧帽",起始:"T1–T4の棘突起",停止:"肩甲骨内側縁（肩甲棘より下）",神経:"肩甲背神経 C4・C5",作用:"肩甲骨を安定させる・上内側に引く"},
  {n:"上腕二頭筋（長頭）",g:"上腕",起始:"肩甲骨・関節上結節",停止:"橈骨粗面・上腕二頭筋腱膜",神経:"筋皮神経 C5・C6",作用:"肘関節の屈曲・回外・肩関節の前方挙上"},
  {n:"上腕二頭筋（短頭）",g:"上腕",起始:"肩甲骨・烏口突起",停止:"橈骨粗面・上腕二頭筋腱膜",神経:"筋皮神経 C5・C6",作用:"肘関節の屈曲・回外・上腕の内転と内旋"},
  {n:"上腕筋",g:"上腕",起始:"上腕骨（肋骨面の遠位半分）",停止:"尺骨粗面",神経:"筋皮神経C5・C6 / 橈骨神経C7（一部）",作用:"肘関節の屈曲"},
  {n:"上腕三頭筋（長頭）",g:"上腕",起始:"肩甲骨・関節下結節",停止:"尺骨の肘頭",神経:"橈骨神経 C6–C8",作用:"肘関節の伸展・肩関節の後方挙上"},
  {n:"上腕三頭筋（内側頭）",g:"上腕",起始:"上腕骨後面（橈骨神経溝の下位）・内側筋間中隔",停止:"尺骨の肘頭（橈側面）",神経:"橈骨神経 C6–C8",作用:"肘関節の伸展と安定化"},
  {n:"上腕三頭筋（外側頭）",g:"上腕",起始:"上腕骨後面（橈骨神経溝の近位）・外側筋間中隔",停止:"尺骨の肘頭（橈側面）",神経:"橈骨神経 C6–C8",作用:"肘関節の伸展と安定化"},
];

const svgCache = {};
let deck=[],wrong=[],idx=0,ok=0,tot=0,flipped=false,currentName='';
let sg='all', sm='all';

document.querySelectorAll('#gchips .chip').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#gchips .chip').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on'); sg=b.dataset.g;
  });
});
document.querySelectorAll('#mchips .chip').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#mchips .chip').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on'); sm=b.dataset.m;
  });
});
document.getElementById('start-btn').addEventListener('click', startQuiz);
document.getElementById('card-wrap').addEventListener('click', flip);
document.getElementById('btn-ng').addEventListener('click', function(){ ans(false); });
document.getElementById('btn-ok').addEventListener('click', function(){ ans(true); });
document.getElementById('back-btn').addEventListener('click', goMenu);
document.getElementById('retry-btn').addEventListener('click', retryWrong);
document.getElementById('menu-btn').addEventListener('click', goMenu);

// ── SVGルックアップ（事前生成済み）──
function fetchSVG(m) {
  return Promise.resolve(
    (typeof SVGS !== 'undefined' && SVGS[m.n]) ? SVGS[m.n] : null
  );
}

function shuffle(a){
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function buildDeck(ms){
  var keys=sm==='all'?['起始','停止','神経','作用']:[sm];
  var c=[]; ms.forEach(function(m){keys.forEach(function(k){c.push({m:m,k:k});});});
  return shuffle(c);
}

function startQuiz(){
  var ms=sg==='all'?MS:MS.filter(function(m){return m.g===sg;});
  deck=buildDeck(ms); wrong=[]; idx=0; ok=0; tot=deck.length;
  show('quiz'); renderCard();
}

function renderCard(){
  if(idx>=deck.length){showResult();return;}
  flipped=false;
  document.getElementById('ci').classList.remove('flipped');
  document.getElementById('ans-row').classList.add('hidden');

  var card=deck[idx]; var m=card.m; var k=card.k;
  currentName=m.n;

  document.getElementById('q-tag').textContent={起始:'起始を答えよ',停止:'停止を答えよ',神経:'支配神経を答えよ',作用:'作用を答えよ'}[k];
  document.getElementById('q-name').textContent=m.n;
  document.getElementById('q-grp').textContent=m.g;

  var bd=document.getElementById('bdata'); bd.innerHTML='';
  var lm={起始:'起始',停止:'停止',神経:'支配神経',作用:'作用'};
  ['起始','停止','神経','作用'].forEach(function(key){
    var d=document.createElement('div');
    d.className='b-item'+(key===k?' hl':'');
    d.innerHTML='<div class="b-lbl">'+lm[key]+'</div><div class="b-val">'+m[key]+'</div>';
    bd.appendChild(d);
  });

  var wrap=document.getElementById('bsvgwrap');
  // キャッシュにあれば即表示
  if(svgCache[m.n]){
    wrap.innerHTML=svgCache[m.n];
  } else {
    wrap.innerHTML='<div class="b-loading"><div class="spinner"></div><div class="b-loading-text">図を生成中…</div></div>';
  }

  // バックグラウンドで先読み（次のカード用）
  var nameAtFetch=m.n;
  fetchSVG(m).then(function(svg){
    if(currentName===nameAtFetch){
      document.getElementById('bsvgwrap').innerHTML=svg;
    }
  }).catch(function(err){
    if(currentName===nameAtFetch){
      document.getElementById('bsvgwrap').innerHTML='<div class="b-err">⚠️ 図の生成に失敗しました<br><small>'+err.message+'</small></div>';
    }
  });

  document.getElementById('prog').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('counter').textContent=(idx+1)+' / '+tot;
}

function flip(){
  if(!flipped){
    flipped=true;
    document.getElementById('ci').classList.add('flipped');
    document.getElementById('ans-row').classList.remove('hidden');
  }
}
function ans(isOk){ if(isOk)ok++; else wrong.push(deck[idx]); idx++; renderCard(); }

function showResult(){
  show('result');
  var pct=Math.round(ok/tot*100);
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-sub').textContent=ok+' / '+tot+'問';
  document.getElementById('ring').style.strokeDashoffset=(2*Math.PI*62*(1-pct/100)).toFixed(1);
  document.getElementById('r-msg').textContent=['繰り返し挑戦しましょう！','半分超えました。間違えた問題を重点的に！','あと少しで完璧！','ほぼ完璧！素晴らしいです 🎉'][pct<50?0:pct<70?1:pct<90?2:3];
  document.getElementById('retry-btn').style.display=wrong.length?'block':'none';
  document.getElementById('stat-block').style.display='block';
  document.getElementById('st-c').textContent=ok;
  document.getElementById('st-t').textContent=tot;
  document.getElementById('st-p').textContent=pct+'%';
}
function retryWrong(){ deck=shuffle(wrong.slice()); wrong=[]; idx=0; ok=0; tot=deck.length; show('quiz'); renderCard(); }
function goMenu(){ show('menu'); }
function show(n){ ['menu','quiz','result'].forEach(function(s){ document.getElementById('s-'+s).classList.toggle('active',s===n); }); }

if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }
});
</script>
