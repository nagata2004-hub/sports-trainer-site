[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# 筋肉テスト（肩・上腕）
[[redirects]]
  from = "/quiz"
  to = "/muscle-quiz/quiz.html"
  status = 200

# 筋肉テスト（肘・前腕）
[[redirects]]
  from = "/elbow"
  to = "/muscle-quiz/quiz2.html"
  status = 200

# 筋肉テスト（骨盤・大腿）
[[redirects]]
  from = "/pelvis"
  to = "/muscle-quiz/quiz3.html"
  status = 200

# 筋肉テスト一覧（ハブ）※相対リンクを効かせるため実URLへ301
[[redirects]]
  from = "/tests"
  to = "/muscle-quiz/tests.html"
  status = 301

# 筋肉テスト（下腿）
[[redirects]]
  from = "/lower-leg"
  to = "/muscle-quiz/quiz4.html"
  status = 200

# 筋肉テスト（足部）
[[redirects]]
  from = "/foot"
  to = "/muscle-quiz/quiz5.html"
  status = 200

# 筋肉テスト（体幹）
[[redirects]]
  from = "/trunk"
  to = "/muscle-quiz/quiz6.html"
  status = 200

# 3D解剖学アプリ：モデルの絶対パス(/models/...)を anatomy-app 配下へ転送
[[redirects]]
  from = "/models/*"
  to = "/anatomy-app/models/:splat"
  status = 200

# v2 アレンジ版
[[redirects]]
  from = "/v2"
  to = "/v2.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
