name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Configure Blobs env vars (Netlify CLI)
        continue-on-error: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # デプロイに使う有効なトークンを、そのまま関数のストレージ用env varに確実にセット。
          # 公式CLIの env:set は全context/全scope(functions含む)にセットするため、
          # 関数が実行時に確実に読める。--force で確認プロンプトを回避。
          npx --yes netlify-cli@17 env:set QUIZ_SITE_ID "$NETLIFY_SITE_ID" --force || true
          npx --yes netlify-cli@17 env:set NETLIFY_API_TOKEN "$NETLIFY_AUTH_TOKEN" --force || true
          npx --yes netlify-cli@17 env:set CONTENT_KEY "75315987" --force || true

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=. --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
