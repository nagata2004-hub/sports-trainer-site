<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理ページ | ST同好会</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #E60012;
      --black: #0a0a0a;
      --gray: #707070;
      --gray-light: #d0d0d0;
      --border: #e8e8e8;
      --bg: #f8f8f8;
      --surface: #fff;
      --serif: 'Noto Serif JP', serif;
      --sans: 'Noto Sans JP', sans-serif;
    }
    body { font-family: var(--sans); font-weight: 300; background: var(--bg); color: var(--black); line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; }

    /* ===== ログイン画面 ===== */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .login-box .eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent); font-weight: 500; }
    .login-box h1 { font-family: var(--serif); font-size: 1.6rem; font-weight: 900; }
    .login-box p { font-size: 0.85rem; color: var(--gray); }
    .login-error { font-size: 0.75rem; color: var(--accent); display: none; }
    .login-error.show { display: block; }

    /* ===== 管理画面ヘッダー ===== */
    .admin-header {
      background: var(--black);
      color: #fff;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header__logo { font-family: var(--serif); font-size: 1.1rem; font-weight: 900; }
    .admin-header__logo span { color: var(--accent); }
    .admin-header__right { display: flex; align-items: center; gap: 1rem; }
    .admin-header__right a { font-size: 0.8rem; color: rgba(255,255,255,0.6); transition: color 0.2s; }
    .admin-header__right a:hover { color: #fff; }

    /* ===== メインレイアウト ===== */
    .admin-body { display: none; }
    .admin-body.show { display: block; }
    .admin-main { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* ===== タブナビ ===== */
    .admin-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .admin-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      color: var(--gray);
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      font-weight: 400;
    }
    .admin-tab:hover { color: var(--black); }
    .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    /* ===== セクションタイトル ===== */
    .section-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent); font-weight: 500; margin-bottom: 0.25rem; }
    .section-title { font-family: var(--serif); font-size: 1.5rem; font-weight: 900; margin-bottom: 2rem; }

    /* ===== 追加フォームカード ===== */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .add-form__title {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid--3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; color: var(--black); }
    input[type="text"],
    input[type="date"],
    input[type="url"],
    select,
    textarea {
      border: none;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      padding: 0.6rem 0.5rem;
      font: 300 0.875rem var(--sans);
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus { border-bottom-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--gray-light); }
    .form-actions { display: flex; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

    /* チェックボックス */
    .check-group { flex-direction: row; align-items: center; gap: 8px; }
    .check-group input { width: auto; }
    .check-group label { font-size: 0.8rem; cursor: pointer; }

    /* ===== ボタン ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .btn--primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn--primary:hover { background: #b8000e; }
    .btn--ghost { background: transparent; color: var(--black); border-color: var(--border); }
    .btn--ghost:hover { border-color: var(--black); }
    .btn--danger { background: transparent; color: #c00; border-color: #c00; font-size: 0.75rem; padding: 0.3rem 0.75rem; }
    .btn--danger:hover { background: #c00; color: #fff; }
    .btn--edit { background: transparent; color: var(--gray); border-color: var(--gray-light); font-size: 0.75rem; padding: 0.3rem 0.75rem; }
    .btn--edit:hover { border-color: var(--black); color: var(--black); }
    .add-form__mode { font-size: 0.75rem; color: var(--accent); font-weight: 500; margin-bottom: 0.75rem; min-height: 1em; }
    .btn--sm { padding: 0.35rem 0.85rem; font-size: 0.75rem; }

    /* ===== 一覧テーブル ===== */
    .items-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .items-count { font-size: 0.8rem; color: var(--gray); }
    .items-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); }
    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      transition: background 0.2s;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: var(--bg); }
    .item-row__body { flex: 1; min-width: 0; }
    .item-row__meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.35rem; flex-wrap: wrap; }
    .item-row__date { font-size: 0.75rem; color: var(--gray); font-family: var(--serif); }
    .item-tag {
      font-size: 0.65rem;
      padding: 2px 8px;
      border: 1px solid var(--border);
      color: var(--gray);
      letter-spacing: 0.06em;
    }
    .item-tag--important { border-color: var(--accent); color: var(--accent); }
    .item-badge-new { font-size: 0.6rem; background: var(--accent); color: #fff; padding: 2px 6px; font-weight: 700; }
    .item-row__title { font-family: var(--serif); font-size: 0.95rem; font-weight: 700; }
    .item-row__sub { font-size: 0.8rem; color: var(--gray); margin-top: 2px; }
    .item-row__actions { flex-shrink: 0; }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--gray);
      font-size: 0.875rem;
      border: 1px dashed var(--border);
      background: var(--surface);
    }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--black);
      color: #fff;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 500;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 640px) {
      .form-grid, .form-grid--3 { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .admin-tab { padding: 0.75rem 0.75rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- ===== ログイン画面 ===== -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <p class="eyebrow">ADMIN</p>
      <h1>管理ページ</h1>
      <p>このページはサイト管理者専用です。パスワードを入力してください。</p>
      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-pw">管理者パスワード</label>
          <input type="password" id="admin-pw" placeholder="パスワードを入力" required autocomplete="current-password" />
        </div>
        <p class="login-error" id="admin-login-error">パスワードが違います。</p>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:1rem;">ログイン</button>
        </div>
      </form>
      <a href="index.html" style="font-size:0.8rem;color:var(--gray);text-align:center;">← サイトに戻る</a>
    </div>
  </div>

  <!-- ===== 管理画面 ===== -->
  <div class="admin-body" id="admin-body">

    <header class="admin-header">
      <div class="admin-header__logo"><span>ST</span> 管理ページ</div>
      <div class="admin-header__right">
        <a href="index.html" target="_blank">サイトを見る →</a>
        <button class="btn btn--ghost btn--sm" id="admin-logout" style="color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2);">ログアウト</button>
      </div>
    </header>

    <main class="admin-main">

      <div class="admin-tabs">
        <button class="admin-tab active" data-panel="news">お知らせ</button>
        <button class="admin-tab" data-panel="videos">動画一覧</button>
        <button class="admin-tab" data-panel="lectures">講義一覧</button>
        <button class="admin-tab" data-panel="memory">暗記学習</button>
      </div>

      <!-- ===== お知らせ管理 ===== -->
      <div class="admin-panel active" id="panel-news">
        <p class="section-label">MANAGE</p>
        <h2 class="section-title">お知らせ管理</h2>

        <div class="add-form">
          <p class="add-form__title">+ 新規追加</p>
          <p class="add-form__mode" id="news-form-mode"></p>
          <form id="news-form">
            <div class="form-grid">
              <div class="form-group">
                <label for="n-date">日付</label>
                <input type="date" id="n-date" required />
              </div>
              <div class="form-group">
                <label for="n-tag">カテゴリ</label>
                <select id="n-tag">
                  <option value="重要">重要</option>
                  <option value="活動報告">活動報告</option>
                  <option value="コンテンツ">コンテンツ</option>
                  <option value="入会">入会</option>
                  <option value="その他">その他</option>
                </select>
              </div>
              <div class="form-group full">
                <label for="n-title">タイトル</label>
                <input type="text" id="n-title" placeholder="お知らせのタイトルを入力" required />
              </div>
              <div class="form-group full">
                <label for="n-body">本文</label>
                <textarea id="n-body" rows="3" placeholder="お知らせの内容を入力" required></textarea>
              </div>
              <div class="form-group check-group">
                <input type="checkbox" id="n-important" />
                <label for="n-important">重要フラグ（赤枠表示）</label>
              </div>
              <div class="form-group check-group">
                <input type="checkbox" id="n-new" checked />
                <label for="n-new">NEWバッジを表示</label>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn--ghost" id="news-cancel" style="display:none" onclick="cancelEdit('news')">キャンセル</button>
              <button type="submit" class="btn btn--primary" id="news-submit">追加する</button>
            </div>
          </form>
        </div>

        <div class="items-header">
          <p class="items-count" id="news-count"></p>
        </div>
        <div id="news-list-admin"></div>
      </div>

      <!-- ===== 動画管理 ===== -->
      <div class="admin-panel" id="panel-videos">
        <p class="section-label">MANAGE</p>
        <h2 class="section-title">動画一覧管理</h2>

        <div class="add-form">
          <p class="add-form__title">+ 新規追加</p>
          <p class="add-form__mode" id="videos-form-mode"></p>
          <form id="videos-form">
            <div class="form-grid">
              <div class="form-group">
                <label for="v-title">タイトル</label>
                <input type="text" id="v-title" placeholder="動画タイトル" required />
              </div>
              <div class="form-group">
                <label for="v-category">カテゴリ</label>
                <select id="v-category">
                  <option value="basics">基礎</option>
                  <option value="stretch">ストレッチ</option>
                  <option value="taping">テーピング</option>
                  <option value="rehab">リハビリ</option>
                </select>
              </div>
              <div class="form-group">
                <label for="v-duration">再生時間</label>
                <input type="text" id="v-duration" placeholder="例：12:34" />
              </div>
              <div class="form-group">
                <label for="v-date">投稿日</label>
                <input type="date" id="v-date" required />
              </div>
              <div class="form-group full">
                <label for="v-url">Google Drive 動画URL（共有リンク）</label>
                <input type="url" id="v-url" placeholder="https://drive.google.com/file/d/.../view?usp=sharing" />
              </div>
              <div class="form-group full">
                <label for="v-thumb">サムネイル画像URL（空欄可）</label>
                <input type="url" id="v-thumb" placeholder="https://..." />
              </div>
              <div class="form-group check-group">
                <input type="checkbox" id="v-new" />
                <label for="v-new">NEWバッジを表示</label>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn--ghost" id="videos-cancel" style="display:none" onclick="cancelEdit('videos')">キャンセル</button>
              <button type="submit" class="btn btn--primary" id="videos-submit">追加する</button>
            </div>
          </form>
        </div>

        <div class="items-header">
          <p class="items-count" id="videos-count"></p>
        </div>
        <div id="videos-list-admin"></div>
      </div>

      <!-- ===== 講義管理 ===== -->
      <div class="admin-panel" id="panel-lectures">
        <p class="section-label">MANAGE</p>
        <h2 class="section-title">講義一覧管理</h2>

        <div class="add-form">
          <p class="add-form__title">+ 新規追加</p>
          <p class="add-form__mode" id="lectures-form-mode"></p>
          <form id="lectures-form">
            <div class="form-grid form-grid--3">
              <div class="form-group">
                <label for="l-title">タイトル</label>
                <input type="text" id="l-title" placeholder="講義タイトル" required />
              </div>
              <div class="form-group">
                <label for="l-category">カテゴリ</label>
                <select id="l-category">
                  <option value="anatomy">解剖学</option>
                  <option value="nutrition">栄養学</option>
                  <option value="taping">テーピング</option>
                  <option value="rehab">リハビリ</option>
                  <option value="sc">S&amp;C</option>
                </select>
              </div>
              <div class="form-group">
                <label for="l-date">実施日</label>
                <input type="date" id="l-date" required />
              </div>
              <div class="form-group">
                <label for="l-instructor">担当講師</label>
                <input type="text" id="l-instructor" placeholder="例：山田 講師" />
              </div>
              <div class="form-group full">
                <label for="l-desc">説明</label>
                <textarea id="l-desc" rows="2" placeholder="講義の概要"></textarea>
              </div>
              <div class="form-group check-group">
                <input type="checkbox" id="l-new" />
                <label for="l-new">NEWバッジを表示</label>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn--ghost" id="lectures-cancel" style="display:none" onclick="cancelEdit('lectures')">キャンセル</button>
              <button type="submit" class="btn btn--primary" id="lectures-submit">追加する</button>
            </div>
          </form>
        </div>

        <div class="items-header">
          <p class="items-count" id="lectures-count"></p>
        </div>
        <div id="lectures-list-admin"></div>
      </div>

      <!-- ===== 暗記学習管理 ===== -->
      <div class="admin-panel" id="panel-memory">
        <p class="section-label">MANAGE</p>
        <h2 class="section-title">暗記学習管理</h2>

        <div class="add-form">
          <p class="add-form__title">+ 新規追加</p>
          <p class="add-form__mode" id="memory-form-mode"></p>
          <form id="memory-form">
            <div class="form-grid">
              <div class="form-group">
                <label for="m-title">タイトル</label>
                <input type="text" id="m-title" placeholder="暗記セットのタイトル" required />
              </div>
              <div class="form-group">
                <label for="m-category">カテゴリ</label>
                <select id="m-category">
                  <option value="anatomy">解剖学</option>
                  <option value="nutrition">栄養学</option>
                  <option value="injury">スポーツ障害</option>
                </select>
              </div>
              <div class="form-group">
                <label for="m-count">問題数</label>
                <input type="text" id="m-count" placeholder="例：40問" />
              </div>
              <div class="form-group">
                <label for="m-progress">習得率 (%)</label>
                <input type="text" id="m-progress" placeholder="例：0" value="0" />
              </div>
              <div class="form-group full">
                <label for="m-desc">説明</label>
                <textarea id="m-desc" rows="2" placeholder="暗記セットの内容説明"></textarea>
              </div>
              <div class="form-group full">
                <label for="m-url">リンク先URL（任意）</label>
                <input type="text" id="m-url" placeholder="例：muscle-quiz/tests.html ※入力すると「押して開く」カードになります" />
              </div>
              <div class="form-group check-group">
                <input type="checkbox" id="m-new" />
                <label for="m-new">NEWバッジを表示</label>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn--ghost" id="memory-cancel" style="display:none" onclick="cancelEdit('memory')">キャンセル</button>
              <button type="submit" class="btn btn--primary" id="memory-submit">追加する</button>
            </div>
          </form>
        </div>

        <div class="items-header">
          <p class="items-count" id="memory-count"></p>
        </div>
        <div id="memory-list-admin"></div>
      </div>

    </main>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    const ADMIN_PASSWORD = '75315987';
    const ADMIN_KEY = 'st_admin_logged_in';

    // ===== ログイン =====
    function isAdminLoggedIn() { return sessionStorage.getItem(ADMIN_KEY) === 'true'; }
    async function adminLogin() {
      sessionStorage.setItem(ADMIN_KEY, 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-body').classList.add('show');
      await syncFromServer();
      renderAll();
    }
    function adminLogout() {
      sessionStorage.removeItem(ADMIN_KEY);
      location.reload();
    }

    if (isAdminLoggedIn()) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-body').classList.add('show');
    }

    document.getElementById('admin-login-form').addEventListener('submit', e => {
      e.preventDefault();
      const pw = document.getElementById('admin-pw').value;
      if (pw === ADMIN_PASSWORD) {
        adminLogin();
      } else {
        document.getElementById('admin-login-error').classList.add('show');
        document.getElementById('admin-pw').value = '';
      }
    });
    document.getElementById('admin-logout').addEventListener('click', adminLogout);

    // ===== タブ =====
    document.querySelectorAll('.admin-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${btn.dataset.panel}`).classList.add('active');
      });
    });

    // ===== データ管理ユーティリティ =====
    function getData(key, defaults) {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : defaults;
    }
    // サーバー保存対象キー
    const SERVER_KEYS = ['st_news', 'st_videos', 'st_lectures', 'st_memory'];
    function saveData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
      // サーバーにも保存 → 全端末・全メンバーに反映
      if (SERVER_KEYS.includes(key)) {
        fetch(`/.netlify/functions/content?key=${key}&pw=${encodeURIComponent(ADMIN_PASSWORD)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        })
          .then(r => r.json())
          .then(j => { if (!j.success) showToast('⚠ サーバー保存に失敗しました'); })

        try {
          const r = await fetch(`/.netlify/functions/content?key=${key}`);
          const j = await r.json();
          if (j && Array.isArray(j.data)) localStorage.setItem(key, JSON.stringify(j.data));
        } catch (_) {}
      }));
    }

        isNew: document.getElementById('m-new').checked,
      };
      if (isEditing) {
        const idx = memory.findIndex(m => m.id === editingId.memory);
        if (idx !== -1) {
          memory[idx] = { ...memory[idx], ...fields };
          if (url) memory[idx].url = url; else delete memory[idx].url;
        }
        editingId.memory = null;
        setEditMode('memory', '');
      } else {
        const item = { id: genId(), ...fields };
        if (url) item.url = url;
        memory.unshift(item);
      }
      saveData('st_memory', memory);
      e.target.reset();
      renderMemory();
      showToast(isEditing ? '暗記セットを更新しました' : '暗記セットを追加しました');
    });

    if (isAdminLoggedIn()) syncFromServer().then(renderAll);
  </script>
</body>
</html>
